<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Personal Details - HTML Form</title>

    <style>
        #page-wrapper {
            margin: 60px auto;
            max-width: 800px;
            width: 100%;
        }

        .cnic-box {
            width: 14px;

        }
    </style>
</head>

<body>

    <div id="page-wrapper">
        <form action="./thank-you.html">
            <table cellspacing="0" cellpadding="15">
                <thead>
                    <tr bgcolor="lightgray">
                        <th bgcolor="lightgreen">
                            <center>
                                <font size="5px">Step 1: Account</font>
                            </center>
                        </th>
                        <th bgcolor="lightblue">
                            <center>
                                <font size="5px" bgcolor="gray">Step 2: Personal Details</font>
                            </center>
                        </th>
                        <th>
                            <center>
                                <font size="5px" bgcolor="gray">Step 3: Your Review</font>
                            </center>
                        </th>
                    </tr>
                </thead>
            </table>
            <br><br>
            <fieldset>
                <legend>
                    <font size="5px"><b>Personal</b></font>
                </legend>
                <br>
                <label for="fname"><b>First Name</b></label><br>
                <input type="text" name="fname" id="fname" placeholder="Enter First Name" required>
                <br><br>
                <label for="lname"><b>Last Name:</b></label><br>
                <input type="text" name="lname" id="lname" placeholder="Enter Last Name">
                <br><br>
                <label><b>CNIC Number:</b></label><br>
                <input class="cnic-box" type="text" name="cnic-p1" id="cnic-p1" maxlength="1">
                <input class="cnic-box" type="text" name="cnic-p2" id="cnic-p2" maxlength="1">
                <input class="cnic-box" type="text" name="cnic-p3" id="cnic-p3" maxlength="1">
                <input class="cnic-box" type="text" name="cnic-p4" id="cnic-p4" maxlength="1">
                <input class="cnic-box" type="text" name="cnic-p5" id="cnic-p5" maxlength="1">-
                <input class="cnic-box" type="text" name="cnic-p6" id="cnic-p6" maxlength="1">
                <input class="cnic-box" type="text" name="cnic-p7" id="cnic-p7" maxlength="1">
                <input class="cnic-box" type="text" name="cnic-p8" id="cnic-p8" maxlength="1">
                <input class="cnic-box" type="text" name="cnic-p9" id="cnic-p9" maxlength="1">
                <input class="cnic-box" type="text" name="cnic-p10" id="cnic-p10" maxlength="1">
                <input class="cnic-box" type="text" name="cnic-p11" id="cnic-p11" maxlength="1">
                <input class="cnic-box" type="text" name="cnic-p12" id="cnic-p12" maxlength="1">-
                <input class="cnic-box" type="text" name="cnic-p13" id="cnic-p13" maxlength="1">
                <br><br>
                <label for="social-links"><b>Social Link:</b></label><br>
                <input type="url" name="social-links" id="social-links"
                    placeholder="Enter Facebook or LinkedIn Profile URL Here">
                <br><br>
                <a href="./account-details.html">
                    <img src="../images/back-button.png" width="180px" alt="Back Button">
                </a>
                <input type="image" src="../images/next-button.png" width="180px" alt="Next Button">
            </fieldset>
        </form>
    </div>

</body>

</html>
