<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Account Details - HTML Form</title>

    <style>
        #page-wrapper {
            margin: 60px auto;
            max-width: 800px;
            width: 100%;
        }
    </style>
</head>

<body>

    <div id="page-wrapper">
        <form action="./personal-details.html">
            <table cellspacing="0" cellpadding="15">
                <thead>
                    <tr bgcolor="lightgray">
                        <th bgcolor="lightblue">
                            <center>
                                <font size="5px">Step 1: Account</font>
                            </center>
                        </th>
                        <th>
                            <center>
                                <font size="5px" bgcolor="gray">Step 2: Personal Details</font>
                            </center>
                        </th>
                        <th>
                            <center>
                                <font size="5px" bgcolor="gray">Step 3: Your Review</font>
                            </center>
                        </th>
                    </tr>
                </thead>
            </table>
            <br><br>
            <fieldset>
                <legend>
                    <font size="5px"><b>Account</b></font>
                </legend>
                <br>
                <label for="email"><b>Email Address:</b></label><br>
                <input type="email" name="email" id="email" required>
                <br><br>
                <label for="password"><b>Password:</b></label><br>
                <input type="password" name="password" id="password" required>
                <br><br>
                <label for="confirm-password"><b>Confirm Password:</b></label><br>
                <input type="password" name="confirm-password" id="confirm-password" required>
                <br><br>
                <a href="../index.html">
                    <img src="../images/back-button.png" width="180px" alt="Back Button">
                </a>
                <input type="image" src="../images/next-button.png" width="180px" alt="Next Button">
            </fieldset>
        </form>
    </div>

</body>

</html>
